<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Travel</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body>
    <div id="auth-section" class="hidden">
        <div id="popup">
            <form action="/login" method="post" class="form" id="login">
                <h1>Login:</h1>
                <label class="search-box">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" class="search-input" name="email" placeholder="Enter your email" required autocomplete="email">
                </label>
                <label class="search-box">
                    <i class="fa-solid fa-key"></i>
                    <input type="password" class="search-input" name="password" placeholder="Enter your password" required>
                </label>
                <button type="submit" id="submit">Login</button>
                <p style="text-align: center;">Don't have an account?<a href="#" id="show-signup" style="color: rgb(177, 151, 252);">Signup</a></p>
            </form>
        </div>
        <div id="popup1" class="hidden">
            <form action="/signup" method="post" class="form" id="signup" >
                <h1>Signup:</h1>
                <label class="search-box">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" class="search-input" name="username" placeholder="Enter your username" id="input" required>
                </label>
                <label class="search-box">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" class="search-input" name="email" placeholder="Enter your email" required>
                </label>
                <label class="search-box">
                    <i class="fa-solid fa-key"></i>
                    <input type="password" class="search-input" name="password" placeholder="Enter your password" required>
                </label>
                <button type="submit">Create account</button>
                <p style="text-align: center;">Already have an account?<a href="#" id="show-login" style="color: rgb(177, 151, 252);">Login</a></p>
            </form>
        </div>
    </div>
    <div id="app-section" class="hidden">
        <p id="welcome">Welcome!!</p>
        <form action="/createtrip" method="post" class="form">
            <h1>Plan a Trip:</h1>
            <label class="search-box">
                <i class="fa-solid fa-location-arrow"></i>
                <input type="search" class="search-input" name="city" id="city" placeholder="Where to go?" required>
                <div id="options"></div>
            </label>
            <label class="search-box">
                <i class="fa-regular fa-calendar-days"></i>
                <input type="text" name="daterange" id="date-range" placeholder="Select Date Range" required>
            </label>
            <button type="submit">Start Planning</button>
        </form>
        <div id="mytrips" class="form" style="align-items:flex-start;">
            <h1>My trips:</h1>
            <div id="mytrips1"></div>
        </div>
    </div>
    <dialog id="popup2">
        <h2>Notes for your trip</h2>
        <textarea id="note-input" style="width: 100%; height: 100px; margin-bottom: 10px;"></textarea><br>
        <button id="save">Save</button>
    </dialog>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="index.js"></script>
</body>
</html>
