<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Travel</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="popup">
        <form action="/login" method="post">
            <h1>Login:</h1>
            <label class="search-box">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" class="search-input" name="email" placeholder="Enter your email" required>
            </label>
            <label class="search-box">
                <i class="fa-solid fa-key"></i>
                <input type="password" class="search-input" name="password" placeholder="Enter your password" required>
            </label>
            <button type="submit" id="submit">Submit</button>
        </form>
    </div>
    <div id="popup1">
        <form action="/signup" method="post">
            <h1>Signup:</h1>
            <label class="search-box">
                <i class="fa-solid fa-user"></i>
                <input type="text" class="search-input" name="username" placeholder="Enter your username" id="input" required>
            </label>
            <label class="search-box">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" class="search-input" name="email" placeholder="Enter your email" required>
            </label>
            <label class="search-box">
                <i class="fa-solid fa-key"></i>
                <input type="password" class="search-input" name="password" placeholder="Enter your password" required>
            </label>
            <button type="submit">Submit</button>
        </form>
    </div>
    <script src="index.js"></script>
</body>
</html>
